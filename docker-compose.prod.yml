version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dream_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-dream_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-dream_wechat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-dream_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dream_network

  redis:
    image: redis:7-alpine
    container_name: dream_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dream_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dream_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dream_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://dream-api.sendto.you
    container_name: dream_admin
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dream_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dream_network:
    driver: bridge
